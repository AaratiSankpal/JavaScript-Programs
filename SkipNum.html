<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!DOCTYPE html>
<html>
<head>
<title>Skip Multiples of 10</title>
</head>
<body>

<h2>Numbers from 1 to 50 (Skipping Multiples of 10)</h2>
<p id="result"></p>

<script>
let output = "";

for (let i = 1; i <= 50; i++) {
    if (i % 10 === 0) {
        continue;
    }
    output += i + " ";
}

document.getElementById("result").innerHTML = output;
</script>

</body>
</html>
