<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Variable</title>
</head>
<body>
    <h1> Variable</h1>
    <script>

        var hello=10;
        document.write(hello+'<br>');
        console.log(hello);//var defined

        hello=15;
        document.write(hello+'<br>');
        console.log(hello);//var reassign

        var hello=20;
        document.write(hello+'<br>');
        console.log(hello);//var redefined

        let data=60;
        document.write(data+'<br>');
        console.log(hello);//let reassign


const demo=100;
document.write(demo+'<br>');
console.log (demo);





    </script>
    
</body>
</html>
