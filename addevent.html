<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM addEvent</title>
</head>
<body>

    <h1>DOM</h1>
    <button id="id1">Click</button>

    <h2 id="data"></h2>

    <script>

        document.getElementById('id1').addEventListener("click",function(){

        document.getElementById('data').innerText='hello everyone,this is addEventListerner'
        })



    </script>
    
</body>
</html>
