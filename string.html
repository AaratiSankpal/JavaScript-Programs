<body>
    <h1>String Method</h1>

    <script>
        let str=" hello everyone , this is javascript."

        let a=str.length
        console.log(a);         //length

        let b=str.toUpperCase();
        console.log(b);         //toUppercase

        let c=str.toLowerCase();
        console.log(c);         //toLowecase

        let d=str.startsWith(" hello");
        console.log(d);            //startswith(true true or faalse value)

        let e=str.endsWith("ipt.");//endswith(true true or faalse value)
        console.log(e);         //endswith

        let f=str.replace("javascript","React");
        console.log(f);         //replace

        let g=str.charAt(8);
        console.log(g);         //CharAt

        let h=str.split(" ");
        console.log(h);         //split


     let i=str.split('');
        console.log(i);         //split(in single qoute define single charcster'' and in double quote "" define words )

    let j=str.slice(4,7);
    console.log(j);






    </script>
