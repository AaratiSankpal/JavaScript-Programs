<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Statments</title>
</head>
<body>
    <h1>LOOPING STATMENT</h1>
    <script>
        //for+continue+break
       let i=10;
        for(let i=0;i<=10;i++)
 {
        if(i==7){
        break;
                }
       console.log(i);
    }

//while loop+break

   let j=0;
   while(j<=25){
       if(j==15){
           break;
       }
      console.log(j);
      j++; 
   }


   //Do while is the 
    let a=0;
   do{
       console.log(a);
       a++;
   }while(a<=11);
    

    </script>
    
</body>
</html>
