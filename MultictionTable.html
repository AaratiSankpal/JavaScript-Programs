<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
</head>
<body>

<h2>5x5 Multiplication Table (Only Even Results)</h2>
<p id="result"></p>

<script>
let table = "";

for (let i = 1; i <= 5; i++) {
    for (let j = 1; j <= 5; j++) {
        let result = i * j;

        if (result % 2 === 0) {
            table += result + " ";
        } else {
            table += " ";
        }
    }
    table += "<br>";
}

document.getElementById("result").innerHTML = table;
</script>

</body>
</html>
