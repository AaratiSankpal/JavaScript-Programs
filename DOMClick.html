<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <p id="id1" title="This is getAttribute date in DOM">GetAttribute</p>
    <button onclick="view()">Click</button>
</body>
<script>
function view(){
    let demo=document.getElementById('id1');
    let demo1=demo.getAttribute('title');

    document.write("GETATTRIBUTR IS:-"+demo1)
}
</script>
</html>
