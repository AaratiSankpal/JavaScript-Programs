<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Type</title>
</head>
<body>
    <script>

//primitive data type

        let hello='Aarati';
          console.log(hello);
            console.log(typeof(hello));//string

        let hello1=200;
         console.log(hello1);
          console.log(typeof(hello1));//number

        
        let data=false;
         console.log(data);
          console.log(typeof(data));//boolean

          
        let data1;
         console.log(data1);
          console.log(typeof(data1));//undefined

        let demo=null;
         console.log(demo);
          console.log(typeof(demo));//null


//non-primitive Data type

        let arr=['hello',40,false,65,null,'view',undefined];
         console.log(arr);
          console.log(typeof(arr));

          let obj={
            name:'aarati',
            city:'maldivs',
            age:21,
          }

          console.log(obj);
          console.log(typeof(obj));

          function shift(a,b){

             console.log('welcome to js ',a+b)
          
          }
          shift(5,9)
    </script>
    
</body>
</html>
