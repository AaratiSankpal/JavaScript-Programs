<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Number</h1>
<script>
    let hello=34.7569;



    let a=Number.parseInt(hello);
    console.log(a);

    let b=Number.parseFloat(hello);
    console.log(b);

    let c=Number.isInteger(hello);
    console.log(c);//reture true and false val if num is positive then reture val true and  num is nagetive reture value is false.

    let d=Number.isFinite(hello);
    console.log(d); //reture true value



    let e=hello.toFixed(6);
    console.log(e);

     let f=hello.toPrecision(5);
    console.log(f);
    


</script>
</body>
</html>
